name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e-test:
    name: E2E Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate protobuf
        run: make generate

      - name: Install Playwright Chromium
        run: make playwright-install-ci

      - name: Run E2E tests
        run: make test-e2e
