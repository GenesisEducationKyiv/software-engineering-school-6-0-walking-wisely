colors: false
pre-commit:
  parallel: true
  commands:
    markdown-links:
      glob: "*.md"
      run: npm run test-markdown-links -- {staged_files}

    fmt:
      glob: "*.go"
      run: goimports -w {staged_files} && gofumpt -w {staged_files} && git add {staged_files}

    vet:
      glob: "*.go"
      run: go vet ./...

    test:
      glob: "*.go"
      run: go test -short ./...
