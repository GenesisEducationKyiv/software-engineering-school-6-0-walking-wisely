filebeat.autodiscover:
  providers:
    - type: docker
      host: "unix:///var/run/docker.sock"
      templates:
        - condition:
            equals:
              docker.container.labels.co.elastic.logs/enabled: "true"
          config:
            - type: filestream
              id: docker-container-logs-${data.docker.container.id}
              paths:
                - /var/lib/docker/containers/${data.docker.container.id}/*.log
              parsers:
                - container: ~
              processors:
                - add_docker_metadata:
                    host: "unix:///var/run/docker.sock"
                - decode_json_fields:
                    fields: ["message"]
                    target: ""
                    overwrite_keys: true
                    expand_keys: true
                    add_error_key: true
                - drop_event:
                    when:
                      not:
                        has_fields: ["service.name"]

setup.kibana:
  host: "kibana:5601"

setup.ilm.enabled: false
setup.template.name: "ses2026-case-logs"
setup.template.pattern: "ses2026-case-logs-*"

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "ses2026-case-logs-%{+yyyy.MM.dd}"
